spring.application.name=backend3
server.port=${PORT:8080}

# AWS RDS POSTGRESQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# LEGACY LOCAL FALLBACK ONLY - NEW IMAGES GO DIRECTLY TO S3
# RDS stores only image URLs, not image files.
easyfish.upload-dir=${EASYFISH_UPLOAD_DIR:uploads}

# AWS S3 + CLOUDFRONT IMAGE STORAGE
aws.s3.enabled=${AWS_S3_ENABLED:true}
aws.s3.region=${AWS_S3_REGION:ap-south-1}
aws.s3.bucket=${AWS_S3_BUCKET:}
# Use CloudFront distribution URL here for faster image loading, example: https://dxxxxx.cloudfront.net
# If empty, backend returns normal S3 public URL.
aws.s3.public-url=${AWS_S3_PUBLIC_URL:}
aws.s3.access-key=${AWS_ACCESS_KEY_ID:}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.presign-expiry-seconds=${AWS_S3_PRESIGN_EXPIRY_SECONDS:900}

# UPLOAD LIMITS - direct upload uses browser -> S3; this remains for fallback endpoints only.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# MAIL / OTP
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# RAZORPAY
razorpay.enabled=${RAZORPAY_ENABLED:true}
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

# TIMEZONE
spring.jackson.time-zone=Asia/Kolkata
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# FAST2SMS OTP
fast2sms.api-key=${FAST2SMS_API_KEY:}
fast2sms.route=${FAST2SMS_ROUTE:otp}
fast2sms.sender-id=${FAST2SMS_SENDER_ID:}


# RAZORPAY WEBHOOK
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}

# HTTPS / PROXY
server.forward-headers-strategy=framework

# CORS
cors.allowed-origins=https://easyfish.in,https://www.easyfish.in

fast2sms.template-id=${FAST2SMS_TEMPLATE_ID:}

# GOOGLE LOGIN
google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
